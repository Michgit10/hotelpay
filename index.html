<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotelPay · Renoma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ─── RENOMA THEME ─────────────────────────────────── */
:root {
  --ink:     #0a0806;
  --ink2:    #14100d;
  --ink3:    #1e1912;
  --ink4:    #2a2318;
  --gold:    #c8a870;
  --gold2:   #e8d0a0;
  --cream:   #f0e8d8;
  --muted:   #7a6e5e;
  --border:  #2e2618;
  --ok:      #4a9e6a;
  --warn:    #c88c3a;
  --err:     #b84040;
  --inf:     #4a7ab0;
  --pur:     #7a5ab0;
  --r: 10px;
  --sh: 0 2px 12px rgba(0,0,0,.4);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html,body { font-family:'Heebo',sans-serif; direction:rtl; background:var(--ink); color:var(--cream); min-height:100vh; font-size:14px; }
::selection { background:var(--gold); color:var(--ink); }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:var(--ink2); } ::-webkit-scrollbar-thumb { background:var(--ink4); border-radius:3px; }

/* ─── HEADER ─── */
.hdr { background:var(--ink); border-bottom:1px solid var(--border); height:62px; padding:0 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
.hdr-brand { display:flex; align-items:center; gap:14px; }
.hdr-logo { display:flex; flex-direction:column; line-height:1.1; }
.hdr-logo-top { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--gold); letter-spacing:.12em; }
.hdr-logo-sub { font-size:9px; font-weight:500; color:var(--muted); letter-spacing:.25em; text-transform:uppercase; }
.hdr-divider { width:1px; height:32px; background:var(--border); }
.hdr-app { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.15em; text-transform:uppercase; }
.hdr-right { display:flex; align-items:center; gap:16px; }
.vat-pill { display:flex; align-items:center; gap:8px; padding:5px 14px; background:var(--ink3); border:1px solid var(--border); border-radius:20px; cursor:pointer; user-select:none; }
.vat-pill span { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; }
.vat-pill.active span { color:var(--gold); }
.sw { position:relative; width:34px; height:18px; }
.sw input { opacity:0; width:0; height:0; position:absolute; }
.sw-t { position:absolute; inset:0; background:var(--ink4); border-radius:18px; transition:.25s; border:1px solid var(--border); }
.sw-t::before { content:""; position:absolute; width:12px; height:12px; right:2px; top:2px; background:var(--muted); border-radius:50%; transition:.25s; }
.sw input:checked ~ .sw-t { background:var(--gold); border-color:var(--gold); }
.sw input:checked ~ .sw-t::before { transform:translateX(-16px); background:var(--ink); }
.hdr-date { font-size:11px; color:var(--muted); letter-spacing:.08em; }

/* ─── TABS ─── */
.tabs { background:var(--ink2); border-bottom:1px solid var(--border); padding:0 24px; display:flex; gap:0; }
.tab { padding:11px 18px; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; border-bottom:2px solid transparent; transition:all .2s; letter-spacing:.06em; white-space:nowrap; }
.tab:hover { color:var(--cream); }
.tab.on { color:var(--gold); border-bottom-color:var(--gold); }

/* ─── MAIN ─── */
.main { padding:28px; max-width:1240px; margin:0 auto; }

/* ─── LOADING ─── */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; height:60vh; gap:16px; }
.loading-ring { width:40px; height:40px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:12px; color:var(--muted); letter-spacing:.1em; }

/* ─── CARD ─── */
.card { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r); }
.cp { padding:20px; }

/* ─── STATS ─── */
.stats { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:24px; }
.stat { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r); padding:16px 18px; position:relative; overflow:hidden; }
.stat::before { content:""; position:absolute; top:0; right:0; left:0; height:2px; background:var(--border); }
.stat.bl::before { background:var(--inf); } .stat.or::before { background:var(--warn); }
.stat.gr::before { background:var(--ok); } .stat.pu::before { background:var(--pur); }
.stat.go::before { background:var(--gold); }
.stat-v { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; color:var(--cream); line-height:1; margin-bottom:6px; }
.stat-v small { font-size:16px; }
.stat-l { font-size:10px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:4px; }
.stat-n { font-size:11px; color:var(--muted); }

/* ─── SECTION HEADER ─── */
.sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.sec-ttl { font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400; color:var(--gold); letter-spacing:.06em; }

/* ─── TABLE ─── */
.tbl { width:100%; border-collapse:collapse; }
.tbl th { text-align:right; padding:9px 14px; font-size:10px; font-weight:700; color:var(--muted); border-bottom:1px solid var(--border); letter-spacing:.12em; text-transform:uppercase; white-space:nowrap; }
.tbl td { padding:11px 14px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:top; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tbody tr:hover td { background:var(--ink3); cursor:pointer; }
.tbl tbody tr.rev td { background:rgba(200,140,58,.06); }

/* ─── BADGE ─── */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; border:1px solid transparent; white-space:nowrap; }

/* ─── ALERT ─── */
.al { padding:5px 10px; border-radius:5px; font-size:11px; margin-top:3px; border-right:2px solid; }
.al.high  { background:rgba(200,140,58,.12); color:#e8b060; border-color:var(--warn); }
.al.low   { background:rgba(74,158,106,.12); color:#6ec890; border-color:var(--ok); }
.al.quote { background:rgba(180,80,140,.12); color:#d070b0; border-color:#b050a0; }
.al.price { background:rgba(184,64,64,.12);  color:#e08080; border-color:var(--err); }

/* ─── BUTTON ─── */
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:7px; font-size:12px; font-weight:700; cursor:pointer; border:none; transition:all .15s; font-family:inherit; white-space:nowrap; letter-spacing:.04em; }
.btn-gold  { background:var(--gold); color:var(--ink); } .btn-gold:hover { background:var(--gold2); }
.btn-dark  { background:var(--ink3); color:var(--cream); border:1px solid var(--border); } .btn-dark:hover { border-color:var(--gold); color:var(--gold); }
.btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); } .btn-ghost:hover { color:var(--cream); border-color:var(--muted); }
.btn-ok   { background:rgba(74,158,106,.15);  color:#6ec890; border:1px solid rgba(74,158,106,.3); }
.btn-bad  { background:rgba(184,64,64,.15);   color:#e08080; border:1px solid rgba(184,64,64,.3); }
.btn-pay  { background:rgba(122,90,176,.15);  color:#c090e0; border:1px solid rgba(122,90,176,.3); }
.btn-rev  { background:rgba(200,140,58,.15);  color:#e0a060; border:1px solid rgba(200,140,58,.3); }
.btn-sm { padding:4px 10px; font-size:11px; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

/* ─── MODAL ─── */
.ov { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; backdrop-filter:blur(4px); }
.modal { background:var(--ink2); border:1px solid var(--border); border-radius:14px; width:100%; max-width:720px; max-height:90vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,.6); }
.m-hdr { padding:20px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--ink2); z-index:1; border-radius:14px 14px 0 0; }
.m-ttl { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; color:var(--gold); letter-spacing:.06em; }
.m-body { padding:24px; }
.m-foot { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:8px; align-items:center; }

/* ─── FORM ─── */
.fg { margin-bottom:16px; }
.fl { display:block; font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; letter-spacing:.1em; text-transform:uppercase; }
.fi { width:100%; padding:9px 12px; background:var(--ink); border:1px solid var(--border); border-radius:7px; font-size:13px; font-family:'Heebo',sans-serif; color:var(--cream); outline:none; transition:border-color .15s; }
.fi:focus { border-color:var(--gold); }
.fi option { background:var(--ink3); }
.fgrid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.vp { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.vp-l { font-size:10px; color:var(--muted); margin-top:3px; letter-spacing:.06em; }
.fi-net { background:var(--ink3); }
textarea.fi { resize:vertical; }

/* ─── UPLOAD ─── */
.uparea { border:1px dashed var(--border); border-radius:10px; padding:28px; text-align:center; cursor:pointer; transition:all .2s; }
.uparea:hover, .uparea.drag { border-color:var(--gold); background:rgba(200,168,112,.06); }
.up-icon { font-size:30px; margin-bottom:8px; opacity:.6; }
.up-text { font-size:13px; color:var(--muted); }
.up-sub { font-size:11px; color:var(--border); margin-top:3px; }

/* ─── SUPPLIER CARD ─── */
.sgrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:14px; }
.scard { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r); padding:18px; cursor:pointer; transition:all .2s; }
.scard:hover, .scard.sel { border-color:var(--gold); }
.cat-tag { display:inline-block; padding:2px 10px; background:rgba(200,168,112,.12); color:var(--gold); border-radius:20px; font-size:10px; font-weight:700; margin-bottom:8px; letter-spacing:.08em; border:1px solid rgba(200,168,112,.2); }
.scard-name { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; color:var(--cream); margin-bottom:4px; }
.scard-meta { font-size:11px; color:var(--muted); }

/* ─── ITEMS TABLE ─── */
.itbl { width:100%; border-collapse:collapse; margin-top:10px; }
.itbl th { text-align:right; padding:6px 8px; font-size:10px; color:var(--muted); background:var(--ink3); border-bottom:1px solid var(--border); letter-spacing:.08em; }
.itbl td { padding:5px 8px; font-size:12px; border-bottom:1px solid var(--border); color:var(--cream); }
.itbl input { width:100%; background:transparent; border:1px solid transparent; border-radius:4px; padding:3px 6px; font-size:12px; font-family:'Heebo',sans-serif; color:var(--cream); }
.itbl input:focus { outline:none; border-color:var(--gold); background:var(--ink); }

/* ─── CHART ─── */
.chart-wrap { background:var(--ink2); border:1px solid var(--border); border-radius:var(--r); padding:22px; margin-bottom:24px; }
.chart-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.chart-ttl { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:400; color:var(--gold); }
.chart-sub { font-size:11px; color:var(--muted); margin-top:2px; }
.chart-legend { display:flex; gap:14px; margin-top:10px; }
.chart-legend span { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; }
.chart-dot { width:8px; height:8px; border-radius:2px; display:inline-block; }

/* ─── FILTER ─── */
.fc { display:flex; gap:7px; flex-wrap:wrap; align-items:center; }
.fchip { padding:4px 13px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .15s; letter-spacing:.04em; }
.fchip:hover { color:var(--cream); border-color:var(--muted); }
.fchip.on { background:var(--gold); color:var(--ink); border-color:var(--gold); }

/* ─── QUOTE CARD ─── */
.qcard { background:var(--ink2); border:1px solid var(--border); border-right:3px solid var(--gold); border-radius:var(--r); padding:16px; margin-bottom:10px; }
.qcard.matched { border-right-color:var(--ok); }
.qcard.old { border-right-color:var(--muted); opacity:.65; }

/* ─── MISC ─── */
.divider { border:none; border-top:1px solid var(--border); margin:18px 0; }
.drow { display:flex; gap:8px; margin-bottom:8px; }
.dkey { font-size:11px; color:var(--muted); min-width:120px; padding-top:2px; letter-spacing:.04em; }
.dval { font-size:13px; font-weight:600; color:var(--cream); }
.amt-blk { display:flex; flex-direction:column; gap:1px; }
.amt-main { font-weight:700; font-size:14px; color:var(--cream); }
.amt-sub { font-size:10px; color:var(--muted); }
.empty { text-align:center; padding:56px 24px; color:var(--muted); }
.empty-ico { font-size:42px; opacity:.3; margin-bottom:12px; }
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--ink3); border:1px solid var(--border); color:var(--cream); padding:10px 22px; border-radius:20px; font-size:13px; font-weight:600; z-index:500; box-shadow:var(--sh); opacity:0; transition:opacity .3s; pointer-events:none; }
.toast.show { opacity:1; }
.vat-box { background:rgba(200,168,112,.1); border:1px solid rgba(200,168,112,.2); border-radius:8px; padding:12px 14px; margin-bottom:16px; font-size:11px; color:var(--gold); display:flex; align-items:flex-start; gap:8px; }

@media(max-width:768px) {
  .stats { grid-template-columns:repeat(2,1fr); }
  .fgrid, .vp { grid-template-columns:1fr; }
  .main { padding:14px; }
  .hdr { padding:0 16px; }
}
</style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">
      <span class="hdr-logo-top">RENOMA</span>
      <span class="hdr-logo-sub">Hotel · Tel Aviv</span>
    </div>
    <div class="hdr-divider"></div>
    <div class="hdr-app">ניהול ספקים</div>
  </div>
  <div class="hdr-right">
    <label class="vat-pill" id="vatPill" onclick="toggleVat()">
      <span id="vatLabel">כולל מע"מ</span>
      <div class="sw"><input type="checkbox" id="vatCb" checked onchange="toggleVat()"><span class="sw-t"></span></div>
    </label>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
</header>

<!-- ─── TABS ────────────────────────────────────── -->
<nav class="tabs">
  <div class="tab on" data-tab="dashboard" onclick="setTab('dashboard')">📊 דשבורד</div>
  <div class="tab" data-tab="invoices" onclick="setTab('invoices')">📄 חשבוניות</div>
  <div class="tab" data-tab="suppliers" onclick="setTab('suppliers')">🏢 ספקים</div>
  <div class="tab" data-tab="quotes" onclick="setTab('quotes')">💬 הצעות מחיר</div>
</nav>

<!-- ─── MAIN ─────────────────────────────────────── -->
<main class="main" id="main">
  <div class="loading" id="loadingEl">
    <div class="loading-ring"></div>
    <div class="loading-text">RENOMA · HOTEL PAY</div>
  </div>
</main>

<!-- ─── TOAST ────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── MODAL CONTAINER ──────────────────────────── -->
<div id="modalContainer"></div>

<script>
// ════════════════════════════════════════════════
//  CONFIG — הדבק כאן את ה-URL של Apps Script
// ════════════════════════════════════════════════
const API_URL = "https://script.google.com/a/macros/acropolisltd.com/s/AKfycbzPjYuCxotJRFDM45kieO0rfIiRn4izV0BefzmQaGoblNpbhYUcMy6G_gZllRwaQT59Jw/exec";

// ════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════
const MO = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const CATS = ["ארוחות ומזון","משקאות","ניקיון","כביסה","גינון","פרחים","אחזקה ומזגנים","חניה ומעליות","שיווק ופרסום","תוכנה וטכנולוגיה","משרדיות ודפוס","ריחות","שירותים","אחר"];
const NOW = new Date();
const VAT = 0.18;
const STATUS = {
  pending:  { l:"ממתין לאישור", c:"#4a7ab0", bg:"rgba(74,122,176,.15)",  e:"⏳" },
  review:   { l:"דורש בדיקה",  c:"#c88c3a", bg:"rgba(200,140,58,.15)",  e:"🔍" },
  approved: { l:"מאושר",        c:"#4a9e6a", bg:"rgba(74,158,106,.15)", e:"✅" },
  rejected: { l:"נדחה",         c:"#b84040", bg:"rgba(184,64,64,.15)",  e:"❌" },
  paid:     { l:"שולם",         c:"#7a5ab0", bg:"rgba(122,90,176,.15)", e:"💰" },
};

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let D = { invoices: [], suppliers: [], quotes: [] };
let UI = { tab: "dashboard", withVat: true, loading: true, selSup: null };
let chartInst = null;

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
const fmt = n => "₪" + Math.round(n||0).toLocaleString("he-IL");
const noVat = n => Math.round(n / (1+VAT));
const addVat = n => Math.round(n * (1+VAT));
const disp = n => UI.withVat ? fmt(n) : fmt(noVat(n));
const uid = () => "_" + Math.random().toString(36).slice(2, 10);
const dStr = (y,m,d) => { const nm=((m%12)+12)%12; const ny=y+Math.floor(m/12); return `${ny}-${String(nm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; };
const toast = (msg, dur=2500) => { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), dur); };

function badge(status) {
  const s = STATUS[status] || STATUS.pending;
  return `<span class="badge" style="background:${s.bg};color:${s.c};border-color:${s.c}30">${s.e} ${s.l}</span>`;
}
function amtHtml(amount) {
  const main = disp(amount);
  const sub = UI.withVat ? `${fmt(noVat(amount))} ללא מע"מ` : `${fmt(amount)} כולל מע"מ`;
  return `<div class="amt-blk"><div class="amt-main">${main}</div><div class="amt-sub">${sub}</div></div>`;
}

function checkAnomalies(inv) {
  const alerts = [];
  const hist = D.invoices.filter(x => x.supplierId===inv.supplierId && String(x.id)!==String(inv.id) && x.status!=="rejected");
  if (hist.length >= 3) {
    const avg = hist.reduce((s,x)=>s+Number(x.amount),0) / hist.length;
    const pct = ((Number(inv.amount)-avg)/avg)*100;
    if (pct > 30) alerts.push({type:"high", msg:`גבוה ב-${Math.round(pct)}% מהממוצע (${fmt(Math.round(avg))})`});
    if (pct < -40) alerts.push({type:"low", msg:`נמוך ב-${Math.round(Math.abs(pct))}% מהממוצע — לוודא שלא חסר`});
  }
  if (inv.quoteId) {
    const q = D.quotes.find(x => String(x.id)===String(inv.quoteId));
    if (q) { const diff=Number(inv.amount)-Number(q.amount); const pct=(diff/Number(q.amount))*100; if(pct>10) alerts.push({type:"quote",msg:`חריגה מהצעת מחיר: +${fmt(diff)} (${Math.round(pct)}%)`}); }
  }
  const sup = D.suppliers.find(s => String(s.id)===String(inv.supplierId));
  if (sup && Array.isArray(sup.catalog)) {
    (inv.items||[]).forEach(item => {
      const cat = sup.catalog.find(c => (item.name||"").toLowerCase().includes((c.name||"").toLowerCase()) || (c.name||"").toLowerCase().includes((item.name||"").toLowerCase()));
      if (cat && Number(item.unitPrice) > Number(cat.price)*1.15) alerts.push({type:"price", msg:`"${item.name}": ${fmt(item.unitPrice)} מעל המוסכם ${fmt(cat.price)}`});
    });
  }
  return alerts;
}

// ════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════
async function apiGet(params) {
  if (!API_URL) return useMockData();
  const url = API_URL + "?" + Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");
  const res = await fetch(url);
  return res.json();
}
async function apiPost(body) {
  if (!API_URL) return { success: true };
  const res = await fetch(API_URL, { method:"POST", body:JSON.stringify(body) });
  return res.json();
}

async function loadAll() {
  UI.loading = true;
  renderLoading();
  try {
    if (!API_URL) { D = getDefaultData(); UI.loading = false; render(); return; }
    const result = await apiGet({ action:"readAll" });
    if (result.error) throw new Error(result.error);
    D.invoices  = (result.invoices  || []).map(normalizeInvoice);
    D.suppliers = (result.suppliers || []).map(normalizeSupplier);
    D.quotes    = (result.quotes    || []).map(normalizeQuote);
  } catch(e) { console.error(e); D = getDefaultData(); }
  UI.loading = false;
  render();
}

async function saveInvoice(inv) {
  D.invoices.push(inv);
  render();
  const r = await apiPost({ action:"add", sheet:"חשבוניות", data:inv });
  if (r.error) toast("שגיאה בשמירה: " + r.error);
  else toast("✓ חשבונית נשמרה");
}
async function updateInvoice(id, updates) {
  D.invoices = D.invoices.map(x => String(x.id)===String(id) ? {...x,...updates} : x);
  render();
  const r = await apiPost({ action:"update", sheet:"חשבוניות", id, updates });
  if (r.error) toast("שגיאה בעדכון");
  else toast("✓ עודכן");
}
async function saveSupplier(sup) {
  if (sup.id && D.suppliers.find(s=>String(s.id)===String(sup.id))) {
    D.suppliers = D.suppliers.map(s=>String(s.id)===String(sup.id)?sup:s);
    await apiPost({ action:"update", sheet:"ספקים", id:sup.id, updates:sup });
  } else {
    sup.id = uid(); sup.createdAt = new Date().toISOString();
    D.suppliers.push(sup);
    await apiPost({ action:"add", sheet:"ספקים", data:sup });
  }
  render(); toast("✓ ספק נשמר");
}
async function saveQuote(quo) {
  quo.id = uid(); quo.createdAt = new Date().toISOString();
  D.quotes.push(quo);
  render();
  await apiPost({ action:"add", sheet:"הצעות_מחיר", data:quo });
  toast("✓ הצעת מחיר נשמרה");
}

// ════════════════════════════════════════════════
//  NORMALIZE (handles data from Sheets)
// ════════════════════════════════════════════════
function normalizeInvoice(x) {
  if (typeof x.items === "string") try { x.items = JSON.parse(x.items); } catch { x.items = []; }
  if (typeof x.alerts === "string") try { x.alerts = JSON.parse(x.alerts); } catch { x.alerts = []; }
  x.amount = Number(x.amount) || 0;
  x.items = x.items || [];
  x.alerts = x.alerts || [];
  return x;
}
function normalizeSupplier(x) {
  if (typeof x.catalog === "string") try { x.catalog = JSON.parse(x.catalog); } catch { x.catalog = []; }
  x.catalog = x.catalog || [];
  return x;
}
function normalizeQuote(x) { x.amount = Number(x.amount) || 0; return x; }

}

// ════════════════════════════════════════════════
//  CHART (Chart.js)
// ════════════════════════════════════════════════
function renderChart() {
  const canvas = document.getElementById("supChart");
  if (!canvas) return;
  const supId = UI.selSup || (UI.selSupView) || (D.suppliers[0]?.id);
  if (!supId) return;

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const labels = [];
  const amounts = [];
  for (let i = 5; i >= 0; i--) {
    const m = NOW.getMonth()-i;
    const nm = ((m%12)+12)%12;
    const ny = NOW.getFullYear()+Math.floor(m/12);
    const tot = D.invoices.filter(x=>String(x.supplierId)===String(supId)&&x.status!=="rejected")
      .filter(x=>{ const d=new Date(x.date); return d.getMonth()===nm&&d.getFullYear()===ny; })
      .reduce((s,x)=>s+Number(x.amount),0);
    labels.push(MO[nm].slice(0,3));
    amounts.push(UI.withVat ? tot : noVat(tot));
  }
  const lyTot = D.invoices.filter(x=>String(x.supplierId)===String(supId)&&x.status!=="rejected")
    .filter(x=>{ const d=new Date(x.date); return d.getMonth()===NOW.getMonth()&&d.getFullYear()===NOW.getFullYear()-1; })
    .reduce((s,x)=>s+Number(x.amount),0);
  labels.push(`${MO[NOW.getMonth()].slice(0,3)} '${String(NOW.getFullYear()-1).slice(2)}`);
  amounts.push(UI.withVat ? lyTot : noVat(lyTot));

  const valid = amounts.slice(0,6).filter(x=>x>0);
  const avg = valid.length ? valid.reduce((s,x)=>s+x,0)/valid.length : 0;

  const colors = [...amounts.slice(0,5).map(()=>"#c8a870"), "#f0e8d8", "#4a9e6a"];

  chartInst = new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: amounts,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          rtl: true,
          callbacks: {
            label: ctx => " " + fmt(ctx.raw)
          },
          backgroundColor: "#1e1912",
          titleColor: "#c8a870",
          bodyColor: "#f0e8d8",
          borderColor: "#2e2618",
          borderWidth: 1,
        },
        annotation: avg > 0 ? {
          annotations: {
            avg: {
              type: "line", yMin: avg, yMax: avg,
              borderColor: "rgba(200,168,112,.4)",
              borderWidth: 1, borderDash: [4,3],
              label: { content:`ממוצע ${fmt(Math.round(avg))}`, display:true, position:"end", color:"#c8a870", font:{size:10} }
            }
          }
        } : {}
      },
      scales: {
        x: { ticks: { color:"#7a6e5e", font:{size:11,family:"Heebo"} }, grid:{display:false}, border:{color:"#2e2618"} },
        y: { ticks: { color:"#7a6e5e", font:{size:11,family:"Heebo"}, callback: v => v ? "₪"+Math.round(v/1000)+"K" : "" }, grid:{color:"rgba(46,38,24,.8)"}, border:{color:"#2e2618"} }
      }
    }
  });
}

// ─── Invoice Detail Modal ───
function openDetail(id) {
  const inv = D.invoices.find(x=>String(x.id)===String(id));
  if (!inv) return;
  const sup = D.suppliers.find(s=>String(s.id)===String(inv.supplierId));
  const quote = inv.quoteId ? D.quotes.find(q=>String(q.id)===String(inv.quoteId)) : null;

  return `<div class="modal">

      <div class="uparea" id="uparea" onclick="document.getElementById('fileIn').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">${previewHtml}</div>

function refreshInvModal() { showModal(buildInvModal()); }
function setInclVat(v){ const n=parseFloat(v)||0; invForm.inclVat=v; invForm.exclVat=n?Math.round(n/1.18):""; document.getElementById("exclVatIn").value=invForm.exclVat; }
function setExclVat(v){ const n=parseFloat(v)||0; invForm.exclVat=v; invForm.inclVat=n?Math.round(n*1.18):""; document.getElementById("inclVatIn").value=invForm.inclVat; }
function updItem(i,k,v){ if(k==="qty"){invForm.items[i].qty=Number(v);invForm.items[i].total=Number(v)*invForm.items[i].unitPrice;}else{invForm.items[i].unitPrice=Number(v);invForm.items[i].total=invForm.items[i].qty*Number(v);}const t=invForm.items.reduce((s,x)=>s+x.total,0);invForm.inclVat=t||invForm.inclVat;invForm.exclVat=t?Math.round(t/1.18):"";document.getElementById("inclVatIn").value=invForm.inclVat;document.getElementById("exclVatIn").value=invForm.exclVat; }
async function handleFile(file){ if(!file)return; const r=new FileReader(); r.onload=e=>{ imgData=e.target.result.split(",")[1]; imgPrev=e.target.result; refreshInvModal(); }; r.readAsDataURL(file); }
function handleDrop(e){ e.preventDefault(); document.getElementById("uparea")?.classList.remove("drag"); handleFile(e.dataTransfer.files[0]); }
async function scanInvoice(){ if(!imgData||!API_URL)return; const btn=document.getElementById("scanBtn"); const msg=document.getElementById("scanMsg"); btn.disabled=true; btn.textContent="⚙ סורק..."; msg.textContent=""; try{ const mt=imgPrev?.includes("png")?"image/png":"image/jpeg"; const r=await apiPost({action:"scan",imageData:imgData,mediaType:mt}); if(r.error){msg.textContent=r.error;return;} const ms=D.suppliers.find(s=>s.name.toLowerCase().includes((r.supplierName||"").toLowerCase().split(" ")[0])); if(ms)invForm.supplierId=ms.id; if(r.invoiceNumber)invForm.invoiceNo=r.invoiceNumber; if(r.invoiceDate)invForm.date=r.invoiceDate.split("/").reverse().join("-"); const iv=r.totalWithVat||Math.round((r.totalWithoutVat||0)*1.18)||0; const ev=r.totalWithoutVat||Math.round((r.totalWithVat||0)/1.18)||0; if(iv){invForm.inclVat=iv;invForm.exclVat=ev;} if(r.items?.length)invForm.items=r.items.map(it=>({name:it.name||"",qty:it.qty||1,unitPrice:it.unitPrice||0,total:it.total||0})); refreshInvModal(); }catch(e){msg.textContent="שגיאה בסריקה";}finally{btn&&(btn.disabled=false);btn&&(btn.textContent="🤖 סרוק עם AI");} }
function submitInvoice(){ if(!invForm.supplierId||!invForm.inclVat)return; const sup=D.suppliers.find(s=>String(s.id)===String(invForm.supplierId)); const inv={id:uid(),supplierId:invForm.supplierId,supplierName:sup?.name||"",invoiceNo:invForm.invoiceNo,amount:Number(invForm.inclVat),date:invForm.date,status:"pending",items:invForm.items.filter(it=>it.name),quoteId:invForm.quoteId||null,notes:invForm.notes,alerts:[],createdAt:new Date().toISOString()}; inv.alerts=checkAnomalies(inv); if(inv.alerts.length)inv.status="review"; saveInvoice(inv); closeModal(); }
