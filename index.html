<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HotelPay · Renoma</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
/* ─── CLEAN FUNCTIONAL THEME ─── */
:root {
  --bg:      #f3f4f6;
  --card:    #ffffff;
  --navy:    #1e3a5f;
  --navy2:   #2d527a;
  --blue:    #2563eb;
  --blue-l:  #eff6ff;
  --text:    #111827;
  --muted:   #6b7280;
  --border:  #e5e7eb;
  --ok:      #059669;
  --ok-l:    #ecfdf5;
  --warn:    #d97706;
  --warn-l:  #fffbeb;
  --err:     #dc2626;
  --err-l:   #fef2f2;
  --pur:     #7c3aed;
  --pur-l:   #f5f3ff;
  --r:       8px;
  --sh:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Heebo',sans-serif;direction:rtl;background:var(--bg);color:var(--text);font-size:14px;}
::selection{background:var(--blue);color:#fff;}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}

/* ─── HEADER ─── */
.hdr{background:var(--navy);height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.hdr-brand{display:flex;align-items:center;gap:12px;}
.hdr-ico{width:32px;height:32px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.hdr-ttl{color:#fff;font-size:15px;font-weight:800;}
.hdr-sub{color:rgba(255,255,255,.5);font-size:10px;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.vat-pill{display:flex;align-items:center;gap:8px;padding:4px 12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;cursor:pointer;user-select:none;}
.vat-pill span{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);}
.sw{position:relative;width:34px;height:18px;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-t{position:absolute;inset:0;background:rgba(255,255,255,.2);border-radius:18px;transition:.25s;}
.sw-t::before{content:"";position:absolute;width:12px;height:12px;right:2px;top:2px;background:#fff;border-radius:50%;transition:.25s;opacity:.7;}
.sw input:checked~.sw-t{background:#3b82f6;}
.sw input:checked~.sw-t::before{transform:translateX(-16px);opacity:1;}
.hdr-date{font-size:11px;color:rgba(255,255,255,.5);}

/* ─── TABS ─── */
.tabs{background:var(--navy);border-bottom:3px solid rgba(0,0,0,.1);padding:0 20px;display:flex;gap:2px;}
.tab{padding:10px 16px;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab:hover{color:rgba(255,255,255,.85);}
.tab.on{color:#fff;border-bottom-color:#60a5fa;}

/* ─── MAIN ─── */
.main{padding:24px;max-width:1200px;margin:0 auto;}

/* ─── CARD ─── */
.card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);}.cp{padding:20px;}

/* ─── LOADING ─── */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:12px;}
.loading-ring{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:13px;color:var(--muted);}

/* ─── STATS ─── */
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:22px;}
.stat{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border);border-top:3px solid var(--border);}
.stat.bl{border-top-color:var(--blue);}
.stat.or{border-top-color:var(--warn);}
.stat.gr{border-top-color:var(--ok);}
.stat.pu{border-top-color:var(--pur);}
.stat.go{border-top-color:#f59e0b;}
.stat-v{font-size:24px;font-weight:800;color:var(--text);line-height:1.1;}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500;}
.stat-n{font-size:11px;color:var(--muted);margin-top:6px;}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}

/* ─── ALERT ─── */
.al{padding:5px 10px;border-radius:5px;font-size:11px;margin-top:3px;border-right:3px solid;}
.al.high{background:var(--warn-l);color:#92400e;border-color:var(--warn);}
.al.low{background:var(--ok-l);color:#065f46;border-color:var(--ok);}
.al.quote{background:#fdf4ff;color:#6b21a8;border-color:#a855f7;}
.al.price{background:var(--err-l);color:#991b1b;border-color:var(--err);}

/* ─── TABLE ─── */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{text-align:right;padding:9px 14px;font-size:11px;font-weight:700;color:var(--muted);border-bottom:1px solid var(--border);background:#f9fafb;white-space:nowrap;letter-spacing:.03em;}
.tbl td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:top;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tbody tr:hover td{background:#f9fafb;cursor:pointer;}
.tbl tbody tr.rev td{background:#fffbeb;}

/* ─── BUTTON ─── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:inherit;white-space:nowrap;}
.btn-navy{background:var(--navy);color:#fff;}.btn-navy:hover{background:var(--navy2);}
.btn-blue{background:var(--blue);color:#fff;}.btn-blue:hover{opacity:.9;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}.btn-ghost:hover{background:var(--bg);}
.btn-sm{padding:4px 9px;font-size:11px;}
.btn-ok{background:var(--ok-l);color:#065f46;border:1px solid #a7f3d0;}
.btn-bad{background:var(--err-l);color:#991b1b;border:1px solid #fecaca;}
.btn-pay{background:var(--pur-l);color:#5b21b6;border:1px solid #ddd6fe;}
.btn-rev{background:var(--warn-l);color:#92400e;border:1px solid #fde68a;}
.btn:disabled{opacity:.4;cursor:not-allowed;}

/* ─── MODAL ─── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:#fff;border-radius:12px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.m-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;border-radius:12px 12px 0 0;}
.m-ttl{font-size:15px;font-weight:800;color:var(--text);}
.m-body{padding:20px;}
.m-foot{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:center;background:#f9fafb;border-radius:0 0 12px 12px;}

/* ─── FORM ─── */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:12px;font-weight:700;color:var(--text);margin-bottom:5px;}
.fi{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-family:'Heebo',sans-serif;color:var(--text);outline:none;transition:border-color .15s;background:#fff;}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.vp{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.vp-l{font-size:10px;color:var(--muted);margin-top:3px;}
.fi-net{background:#f9fafb;}
textarea.fi{resize:vertical;}

/* ─── UPLOAD ─── */
.uparea{border:2px dashed var(--border);border-radius:8px;padding:24px;text-align:center;cursor:pointer;transition:all .2s;background:#fafafa;}
.uparea:hover,.uparea.drag{border-color:var(--blue);background:var(--blue-l);}
.up-icon{font-size:28px;margin-bottom:6px;opacity:.5;}
.up-text{font-size:13px;color:var(--muted);font-weight:500;}
.up-sub{font-size:11px;color:#9ca3af;margin-top:2px;}

/* ─── SUPPLIER CARD ─── */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.scard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .15s;}
.scard:hover,.scard.sel{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08);}
.cat-tag{display:inline-block;padding:2px 8px;background:var(--blue-l);color:var(--blue);border-radius:20px;font-size:10px;font-weight:700;margin-bottom:6px;}
.scard-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
.scard-meta{font-size:11px;color:var(--muted);}

/* ─── ITEMS TABLE ─── */
.itbl{width:100%;border-collapse:collapse;margin-top:8px;}
.itbl th{text-align:right;padding:6px 8px;font-size:10px;color:var(--muted);background:#f9fafb;border-bottom:1px solid var(--border);font-weight:700;}
.itbl td{padding:5px 8px;font-size:12px;border-bottom:1px solid var(--border);}
.itbl input{width:100%;background:transparent;border:1px solid transparent;border-radius:4px;padding:3px 5px;font-size:12px;font-family:'Heebo',sans-serif;color:var(--text);}
.itbl input:focus{outline:none;border-color:var(--blue);background:#fff;}

/* ─── CHART ─── */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:22px;box-shadow:var(--sh);}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.chart-ttl{font-size:14px;font-weight:700;color:var(--text);}
.chart-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.chart-legend{display:flex;gap:14px;margin-top:10px;}
.chart-legend span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.chart-dot{width:8px;height:8px;border-radius:2px;display:inline-block;}

/* ─── FILTER ─── */
.fc{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.fchip{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--muted);transition:all .15s;}
.fchip:hover{color:var(--text);border-color:#9ca3af;}
.fchip.on{background:var(--navy);color:#fff;border-color:var(--navy);}

/* ─── QUOTE CARD ─── */
.qcard{background:var(--card);border:1px solid var(--border);border-right:3px solid var(--warn);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);}
.qcard.matched{border-right-color:var(--ok);}
.qcard.old{border-right-color:var(--muted);opacity:.65;}

/* ─── MISC ─── */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.drow{display:flex;gap:8px;margin-bottom:7px;}
.dkey{font-size:11px;color:var(--muted);min-width:120px;padding-top:2px;font-weight:500;}
.dval{font-size:13px;font-weight:600;color:var(--text);}
.amt-blk{display:flex;flex-direction:column;gap:1px;}
.amt-main{font-weight:700;font-size:14px;color:var(--text);}
.amt-sub{font-size:10px;color:var(--muted);}
.empty{text-align:center;padding:44px 24px;color:var(--muted);}
.empty-ico{font-size:40px;margin-bottom:10px;opacity:.3;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;z-index:500;box-shadow:var(--sh-md);opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.vat-box{background:var(--blue-l);border:1px solid #bfdbfe;border-radius:7px;padding:10px 14px;margin-bottom:14px;font-size:12px;color:#1e40af;display:flex;align-items:flex-start;gap:8px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-ttl{font-size:18px;font-weight:800;color:var(--text);}
@media(max-width:768px){.stats{grid-template-columns:repeat(2,1fr);}.fgrid,.vp{grid-template-columns:1fr;}.main{padding:14px;}}
</style>
</head>
<body>

<!-- ─── HEADER ─────────────────────────────────── -->
<header class="hdr">
  <div class="hdr-brand">
    <div class="hdr-brand"><div class="hdr-ico">🏨</div><div><div class="hdr-ttl">HotelPay</div><div class="hdr-sub">ניהול חשבוניות וספקים</div></div></div>
  </div>
  <div class="hdr-right">
    <label class="vat-pill" id="vatPill" onclick="toggleVat()">
      <span id="vatLabel">כולל מע"מ</span>
      <div class="sw"><input type="checkbox" id="vatCb" checked onchange="toggleVat()"><span class="sw-t"></span></div>
    </label>
    <button class="btn" style="background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);font-size:11px;padding:4px 10px" onclick="loadAll()" id="refreshBtn">↻ רענן</button>
    <button class="btn" style="background:rgba(255,100,100,.2);color:#fca;border:1px solid rgba(255,100,100,.3);font-size:11px;padding:4px 10px" onclick="debugApi()">🔧 בדוק API</button>
    <div class="hdr-date" id="hdrDate"></div>
  </div>
</header>

<!-- ─── TABS ────────────────────────────────────── -->
<nav class="tabs">
  <div class="tab on" data-tab="dashboard" onclick="setTab('dashboard')">📊 דשבורד</div>
  <div class="tab" data-tab="invoices" onclick="setTab('invoices')">📄 חשבוניות</div>
  <div class="tab" data-tab="suppliers" onclick="setTab('suppliers')">🏢 ספקים</div>
  <div class="tab" data-tab="quotes" onclick="setTab('quotes')">💬 הצעות מחיר</div>
</nav>

<!-- ─── MAIN ─────────────────────────────────────── -->
<main class="main" id="main">
  <div class="loading" id="loadingEl">
    <div class="loading-ring"></div>
    <div class="loading-text">RENOMA · HOTEL PAY</div>
  </div>
</main>

<!-- ─── TOAST ────────────────────────────────────── -->
<div class="toast" id="toast"></div>

<!-- ─── MODAL CONTAINER ──────────────────────────── -->
<div id="modalContainer"></div>

<script>
// ════════════════════════════════════════════════
//  CONFIG — הדבק כאן את ה-URL של Apps Script
// ════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbzeUro3VuPC8F_z9tm1j8o8x38V8PyGGLtiVN_HAuDwHJ5-DfZsKFmFAhathA7dwbmm/exec";

// ════════════════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════════════════
const MO = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const CATS = ["ארוחות ומזון","משקאות","ניקיון","כביסה","גינון","פרחים","אחזקה ומזגנים","חניה ומעליות","שיווק ופרסום","תוכנה וטכנולוגיה","משרדיות ודפוס","ריחות","שירותים","אחר"];
const NOW = new Date();
const VAT = 0.18;
const STATUS = {
  pending:  { l:"ממתין לאישור", c:"#4a7ab0", bg:"rgba(74,122,176,.15)",  e:"⏳" },
  review:   { l:"דורש בדיקה",  c:"#c88c3a", bg:"rgba(200,140,58,.15)",  e:"🔍" },
  approved: { l:"מאושר",        c:"#4a9e6a", bg:"rgba(74,158,106,.15)", e:"✅" },
  rejected: { l:"נדחה",         c:"#b84040", bg:"rgba(184,64,64,.15)",  e:"❌" },
  paid:     { l:"שולם",         c:"#7a5ab0", bg:"rgba(122,90,176,.15)", e:"💰" },
};

// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let D = { invoices: [], suppliers: [], quotes: [] };
let UI = { tab: "dashboard", withVat: true, loading: true, selSup: null };
let chartInst = null;

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
const fmt = n => "₪" + Math.round(n||0).toLocaleString("he-IL");
const noVat = n => Math.round(n / (1+VAT));
const addVat = n => Math.round(n * (1+VAT));
const disp = n => UI.withVat ? fmt(n) : fmt(noVat(n));
const uid = () => "_" + Math.random().toString(36).slice(2, 10);
const dStr = (y,m,d) => { const nm=((m%12)+12)%12; const ny=y+Math.floor(m/12); return `${ny}-${String(nm+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; };
const toast = (msg, dur=2500) => { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), dur); };

function badge(status) {
  const s = STATUS[status] || STATUS.pending;
  return `<span class="badge" style="background:${s.bg};color:${s.c};border-color:${s.c}30">${s.e} ${s.l}</span>`;
}
function amtHtml(amount) {
  const main = disp(amount);
  const sub = UI.withVat ? `${fmt(noVat(amount))} ללא מע"מ` : `${fmt(amount)} כולל מע"מ`;
  return `<div class="amt-blk"><div class="amt-main">${main}</div><div class="amt-sub">${sub}</div></div>`;
}

function checkAnomalies(inv) {
  const alerts = [];
  const hist = D.invoices.filter(x => x.supplierId===inv.supplierId && String(x.id)!==String(inv.id) && x.status!=="rejected");
  if (hist.length >= 3) {
    const avg = hist.reduce((s,x)=>s+Number(x.amount),0) / hist.length;
    const pct = ((Number(inv.amount)-avg)/avg)*100;
    if (pct > 30) alerts.push({type:"high", msg:`גבוה ב-${Math.round(pct)}% מהממוצע (${fmt(Math.round(avg))})`});
    if (pct < -40) alerts.push({type:"low", msg:`נמוך ב-${Math.round(Math.abs(pct))}% מהממוצע — לוודא שלא חסר`});
  }
  if (inv.quoteId) {
    const q = D.quotes.find(x => String(x.id)===String(inv.quoteId));
    if (q) { const diff=Number(inv.amount)-Number(q.amount); const pct=(diff/Number(q.amount))*100; if(pct>10) alerts.push({type:"quote",msg:`חריגה מהצעת מחיר: +${fmt(diff)} (${Math.round(pct)}%)`}); }
  }
  const sup = D.suppliers.find(s => String(s.id)===String(inv.supplierId));
  if (sup && Array.isArray(sup.catalog)) {
    (inv.items||[]).forEach(item => {
      const cat = sup.catalog.find(c => (item.name||"").toLowerCase().includes((c.name||"").toLowerCase()) || (c.name||"").toLowerCase().includes((item.name||"").toLowerCase()));
      if (cat && Number(item.unitPrice) > Number(cat.price)*1.15) alerts.push({type:"price", msg:`"${item.name}": ${fmt(item.unitPrice)} מעל המוסכם ${fmt(cat.price)}`});
    });
  }
  return alerts;
}

// ════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════
async function apiGet(params) {
  if (!API_URL) return getDefaultData();
  const url = API_URL + "?" + Object.entries(params).map(([k,v])=>`${k}=${encodeURIComponent(v)}`).join("&");
  const res = await fetch(url, { redirect: "follow" });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function apiPost(body) {
  if (!API_URL) return { success: true };
  const res = await fetch(API_URL, {
    method: "POST",
    redirect: "follow",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

async function loadAll() {
  UI.loading = true;
  renderLoading();
  try {
    if (!API_URL) { D = getDefaultData(); UI.loading = false; render(); return; }
    const result = await apiGet({ action:"readAll" });
    if (result.error) throw new Error(result.error);
    D.invoices  = (result.invoices  || []).map(normalizeInvoice);
    D.suppliers = (result.suppliers || []).map(normalizeSupplier);
    D.quotes    = (result.quotes    || []).map(normalizeQuote);
  } catch(e) {
    console.error("loadAll error:", e);
    toast("⚠️ שגיאה בטעינת נתונים: " + e.message, 5000);
    D = getDefaultData();
  }
  UI.loading = false;
  render();
}

async function saveInvoice(inv) {
  D.invoices.push(inv);
  render();
  const r = await apiPost({ action:"add", sheet:"חשבוניות", data:inv });
  if (r.error) toast("שגיאה בשמירה: " + r.error);
  else toast("✓ חשבונית נשמרה");
}
async function updateInvoice(id, updates) {
  D.invoices = D.invoices.map(x => String(x.id)===String(id) ? {...x,...updates} : x);
  render();
  const r = await apiPost({ action:"update", sheet:"חשבוניות", id, updates });
  if (r.error) toast("שגיאה בעדכון");
  else toast("✓ עודכן");
}
async function saveSupplier(sup) {
  if (sup.id && D.suppliers.find(s=>String(s.id)===String(sup.id))) {
    D.suppliers = D.suppliers.map(s=>String(s.id)===String(sup.id)?sup:s);
    await apiPost({ action:"update", sheet:"ספקים", id:sup.id, updates:sup });
  } else {
    sup.id = uid(); sup.createdAt = new Date().toISOString();
    D.suppliers.push(sup);
    await apiPost({ action:"add", sheet:"ספקים", data:sup });
  }
  render(); toast("✓ ספק נשמר");
}
async function saveQuote(quo) {
  quo.id = uid(); quo.createdAt = new Date().toISOString();
  D.quotes.push(quo);
  render();
  await apiPost({ action:"add", sheet:"הצעות_מחיר", data:quo });
  toast("✓ הצעת מחיר נשמרה");
}

//  NORMALIZE (handles data from Sheets)
// ════════════════════════════════════════════════
function normalizeInvoice(x) {
  if (typeof x.items === "string") try { x.items = JSON.parse(x.items); } catch { x.items = []; }
  if (typeof x.alerts === "string") try { x.alerts = JSON.parse(x.alerts); } catch { x.alerts = []; }
  x.amount = Number(x.amount) || 0;
  x.items = x.items || [];
  x.alerts = x.alerts || [];
  return x;
}
function normalizeSupplier(x) {
  if (typeof x.catalog === "string") try { x.catalog = JSON.parse(x.catalog); } catch { x.catalog = []; }
  x.catalog = x.catalog || [];
  return x;
}
function normalizeQuote(x) { x.amount = Number(x.amount) || 0; return x; }

// ════════════════════════════════════════════════
//  CHART (Chart.js)
// ════════════════════════════════════════════════
function renderChart() {
  const canvas = document.getElementById("supChart");
  if (!canvas) return;
  const supId = UI.selSup || (UI.selSupView) || (D.suppliers[0]?.id);
  if (!supId) return;

  if (chartInst) { chartInst.destroy(); chartInst = null; }

  const labels = [];
  const amounts = [];
  for (let i = 5; i >= 0; i--) {
    const m = NOW.getMonth()-i;
    const nm = ((m%12)+12)%12;
    const ny = NOW.getFullYear()+Math.floor(m/12);
    const tot = D.invoices.filter(x=>String(x.supplierId)===String(supId)&&x.status!=="rejected")
      .filter(x=>{ const d=new Date(x.date); return d.getMonth()===nm&&d.getFullYear()===ny; })
      .reduce((s,x)=>s+Number(x.amount),0);
    labels.push(MO[nm].slice(0,3));
    amounts.push(UI.withVat ? tot : noVat(tot));
  }
  const lyTot = D.invoices.filter(x=>String(x.supplierId)===String(supId)&&x.status!=="rejected")
    .filter(x=>{ const d=new Date(x.date); return d.getMonth()===NOW.getMonth()&&d.getFullYear()===NOW.getFullYear()-1; })
    .reduce((s,x)=>s+Number(x.amount),0);
  labels.push(`${MO[NOW.getMonth()].slice(0,3)} '${String(NOW.getFullYear()-1).slice(2)}`);
  amounts.push(UI.withVat ? lyTot : noVat(lyTot));

  const valid = amounts.slice(0,6).filter(x=>x>0);
  const avg = valid.length ? valid.reduce((s,x)=>s+x,0)/valid.length : 0;

  const colors = [...amounts.slice(0,5).map(()=>"#c8a870"), "#f0e8d8", "#4a9e6a"];

  chartInst = new Chart(canvas.getContext("2d"), {
    type: "bar",
    data: {
      labels,
      datasets: [{
        data: amounts,
        backgroundColor: colors,
        borderRadius: 4,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          rtl: true,
          callbacks: {
            label: ctx => " " + fmt(ctx.raw)
          },
          backgroundColor: "#1e1912",
          titleColor: "#c8a870",
          bodyColor: "#f0e8d8",
          borderColor: "#2e2618",
          borderWidth: 1,
        },
        annotation: avg > 0 ? {
          annotations: {
            avg: {
              type: "line", yMin: avg, yMax: avg,
              borderColor: "rgba(200,168,112,.4)",
              borderWidth: 1, borderDash: [4,3],
              label: { content:`ממוצע ${fmt(Math.round(avg))}`, display:true, position:"end", color:"#c8a870", font:{size:10} }
            }
          }
        } : {}
      },
      scales: {
        x: { ticks: { color:"#7a6e5e", font:{size:11,family:"Heebo"} }, grid:{display:false}, border:{color:"#2e2618"} },
        y: { ticks: { color:"#7a6e5e", font:{size:11,family:"Heebo"}, callback: v => v ? "₪"+Math.round(v/1000)+"K" : "" }, grid:{color:"rgba(46,38,24,.8)"}, border:{color:"#2e2618"} }
      }
    }
  });
}

      <div class="uparea" id="uparea" onclick="document.getElementById('fileIn').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)">${previewHtml}</div>

function refreshInvModal() { showModal(buildInvModal()); }
function setInclVat(v){ const n=parseFloat(v)||0; invForm.inclVat=v; invForm.exclVat=n?Math.round(n/1.18):""; document.getElementById("exclVatIn").value=invForm.exclVat; }
function setExclVat(v){ const n=parseFloat(v)||0; invForm.exclVat=v; invForm.inclVat=n?Math.round(n*1.18):""; document.getElementById("inclVatIn").value=invForm.inclVat; }
function updItem(i,k,v){ if(k==="qty"){invForm.items[i].qty=Number(v);invForm.items[i].total=Number(v)*invForm.items[i].unitPrice;}else{invForm.items[i].unitPrice=Number(v);invForm.items[i].total=invForm.items[i].qty*Number(v);}const t=invForm.items.reduce((s,x)=>s+x.total,0);invForm.inclVat=t||invForm.inclVat;invForm.exclVat=t?Math.round(t/1.18):"";document.getElementById("inclVatIn").value=invForm.inclVat;document.getElementById("exclVatIn").value=invForm.exclVat; }
async function handleFile(file){ if(!file)return; const r=new FileReader(); r.onload=e=>{ imgData=e.target.result.split(",")[1]; imgPrev=e.target.result; refreshInvModal(); }; r.readAsDataURL(file); }
function handleDrop(e){ e.preventDefault(); document.getElementById("uparea")?.classList.remove("drag"); handleFile(e.dataTransfer.files[0]); }
async function scanInvoice(){ if(!imgData||!API_URL)return; const btn=document.getElementById("scanBtn"); const msg=document.getElementById("scanMsg"); btn.disabled=true; btn.textContent="⚙ סורק..."; msg.textContent=""; try{ const mt=imgPrev?.includes("data:image/png")?"image/png":imgPrev?.includes("data:application/pdf")?"application/pdf":"image/jpeg"; const r=await apiPost({action:"scan",imageData:imgData,mediaType:mt}); if(r.error){msg.textContent="שגיאה: "+r.error;return;} const ms=D.suppliers.find(s=>s.name.toLowerCase().includes((r.supplierName||"").toLowerCase().split(" ")[0])); if(ms)invForm.supplierId=ms.id; if(r.invoiceNumber)invForm.invoiceNo=r.invoiceNumber; if(r.invoiceDate)invForm.date=r.invoiceDate.split("/").reverse().join("-"); const iv=r.totalWithVat||Math.round((r.totalWithoutVat||0)*1.18)||0; const ev=r.totalWithoutVat||Math.round((r.totalWithVat||0)/1.18)||0; if(iv){invForm.inclVat=iv;invForm.exclVat=ev;} if(r.items?.length)invForm.items=r.items.map(it=>({name:it.name||"",qty:it.qty||1,unitPrice:it.unitPrice||0,total:it.total||0})); msg.textContent="✓ סריקה הושלמה"; refreshInvModal(); }catch(e){msg.textContent="שגיאה בסריקה: "+e.message; console.error("scan error:",e);}finally{btn&&(btn.disabled=false);btn&&(btn.textContent="🤖 סרוק עם AI");} }
function submitInvoice(){ if(!invForm.supplierId||!invForm.inclVat)return; const sup=D.suppliers.find(s=>String(s.id)===String(invForm.supplierId)); const inv={id:uid(),supplierId:invForm.supplierId,supplierName:sup?.name||"",invoiceNo:invForm.invoiceNo,amount:Number(invForm.inclVat),date:invForm.date,status:"pending",items:invForm.items.filter(it=>it.name),quoteId:invForm.quoteId||null,notes:invForm.notes,alerts:[],createdAt:new Date().toISOString()}; inv.alerts=checkAnomalies(inv); if(inv.alerts.length)inv.status="review"; saveInvoice(inv); closeModal(); }

  return { invoices: invs.map(normalizeInvoice), suppliers: sups.map(normalizeSupplier), quotes: [] };

async function debugApi() {
  try {
    const url = API_URL + "?action=readAll";
    const res = await fetch(url, { redirect: "follow" });
    const text = await res.text();
    let parsed;
    try { parsed = JSON.parse(text); } catch { parsed = null; }
    const inv = parsed?.invoices?.length ?? "שגיאה";
    const sup = parsed?.suppliers?.length ?? "שגיאה";
    const msg = parsed
      ? `✅ תשובה תקינה\nחשבוניות: ${inv}\nספקים: ${sup}\n\n5 שורות ראשונות:\n${JSON.stringify(parsed.invoices?.slice(0,2), null, 2)}`
      : `❌ תשובה לא תקינה:\n${text.slice(0, 500)}`;
    alert(msg);
  } catch(e) {
    alert("❌ שגיאת רשת / CORS:\n" + e.message);
  }
}

setInterval(() => { if (!UI.loading) loadAll(); }, 30000);
